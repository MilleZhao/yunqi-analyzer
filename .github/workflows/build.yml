name: Build and Push to ACR

on:
  push:
    branches: [master]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Login to ACR
        run: |
          echo "${{ secrets.ACR_PASSWORD }}" | docker login --username "${{ secrets.ACR_USERNAME }}" --password-stdin crpi-hhhd1ym0vn8x5l6u.cn-shanghai.personal.cr.aliyuncs.com

      - name: Build and Push
        run: |
          docker build -t crpi-hhhd1ym0vn8x5l6u.cn-shanghai.personal.cr.aliyuncs.com/mille/videoanalysis:latest .
          docker push crpi-hhhd1ym0vn8x5l6u.cn-shanghai.personal.cr.aliyuncs.com/mille/videoanalysis:latest
